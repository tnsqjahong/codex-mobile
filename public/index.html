<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#151513" />
    <title>Codex Mobile</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <section class="pairing-view">
        <div class="brand-row">
          <span class="brand-mark"></span>
          <span>Codex Mobile</span>
        </div>
        <h1>컴퓨터의 Codex 세션에 연결</h1>
        <p>이 컴퓨터에서 Codex 준비를 마친 뒤 QR을 스캔하면 휴대폰에서 로컬 Codex 프로젝트와 채팅을 이어볼 수 있습니다.</p>
        <div id="desktop-status" class="status-panel" aria-live="polite"></div>
        <form id="pair-form" class="pair-form">
          <input id="pair-code" autocomplete="one-time-code" placeholder="Pairing code" />
          <button type="submit">Connect</button>
        </form>
        <button id="start-pair" class="ghost-button" disabled>Finish desktop setup first</button>
        <p id="pair-help" class="muted"></p>
      </section>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
